{% extends "!simple/page.html" %}

{% block page_content %}
    {% if page.links %}
      <div class="aio-post-links">
        {% for link in page.links %}
          <a class="aio-post-links__item" href="{{ link.partition("=")[2] }}">{{ link.partition("=")[0] }}</a>
        {% endfor %}
      </div>
    {% endif %}

    {{ super() }}
{% endblock %}
